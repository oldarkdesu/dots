[general]
import = [
	"./dodecabit.toml",
	# "./fav-themes/blood_moon.toml",
	# "./alacritty-theme/themes/alabaster_dark.toml",
	# "./alacritty-theme/themes/gruvbox_dark.toml",
	# "./alacritty-theme/themes/moonfly.toml",
]

[font]
size = 14
normal = {family = 'monospace'}
offset = {x=0, y=-3}
builtin_box_drawing = true

[window]
dynamic_padding = true
dimensions = {columns = 100, lines = 25}
opacity = 0.85
# blur = true
#
[bell]
duration = 250
animation = "Linear"

[scrolling]
history = 100000

[cursor]
style = { shape="block", blinking="On" }
blink_interval = 700

[selection]
save_to_clipboard = true

[terminal]
osc52 = "CopyPaste"
