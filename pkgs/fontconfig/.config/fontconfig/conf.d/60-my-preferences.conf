<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
	<description>My personal, preffered fonts</description>
	<match target="pattern">
		<test name="family" qual="any">
			<string>monospace</string>
		</test>
		<edit name="family" mode="prepend" binding="strong">
			<string>Iosevka Fixed Curly</string>
			<string>Symbols Nerd Font</string>
		</edit>
	</match>
	<alias>
		<family>iosevka</family>
		<prefer>
			<family>Iosevka Fixed Curly</family>
			<!-- fallback glyphs-->
			<family>Symbols Nerd Font</family>
		</prefer>
	</alias>


	<!-- Croscore fonts -->
	<alias>
		<family>Helvetica</family>
		<prefer>
			<family>Arimo</family>
		</prefer>
	</alias>
	<alias>
		<family>Times</family>
		<prefer>
			<family>Tinos</family>
		</prefer>
	</alias>
	<alias>
		<family>Courier</family>
		<prefer>
			<family>Cousine</family>
		</prefer>
	</alias>
	<alias>
		<family>Georgia</family>
		<prefer>
			<family>Gelasio</family>
		</prefer>
	</alias>
 </fontconfig>
